apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: snake-duel

resources:
  - namespace.yaml
  - client-deployment.yaml
  - client-service.yaml
  - client-ingress.yaml
  - server-deployment.yaml
  - server-service.yaml
  - server-ingress.yaml

configMapGenerator:
  - name: snake-duel-client-config
    envs:
      - client-config.env

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: snake-duel
