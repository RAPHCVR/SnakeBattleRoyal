apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: snake-duel-server
spec:
  ingressClassName: nginx
  rules:
    - host: apisnake.raphcvr.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: snake-duel-server
                port:
                  name: http
