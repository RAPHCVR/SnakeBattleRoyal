apiVersion: apps/v1
kind: Deployment
metadata:
  name: snake-duel-client
  labels:
    app.kubernetes.io/name: snake-duel-client
    app.kubernetes.io/component: client
spec:
  replicas: 2
  revisionHistoryLimit: 5
  minReadySeconds: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: snake-duel-client
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: snake-duel-client
        app.kubernetes.io/component: client
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 10
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: client
          image: snake-duel-client:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: snake-duel-client-config
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
